providers = ["php", "node"]

[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_PHP_EXTENSIONS = "intl,zip,gd,pdo_mysql,bcmath,mbstring,exif"

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
  "npm ci",
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan storage:link || true",
  "php artisan filament:assets",
]

[start]
cmd = "php artisan config:clear && php artisan view:clear && php artisan cache:clear && php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT"
