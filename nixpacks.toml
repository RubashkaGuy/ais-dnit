providers = ["php", "node"]

[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_PHP_EXTENSIONS = "intl,zip,gd,pdo_mysql,bcmath,mbstring,exif"

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
  "npm ci",
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan storage:link || true",
  "php artisan filament:assets",
]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php -S 0.0.0.0:$PORT -t public public/index.php"
